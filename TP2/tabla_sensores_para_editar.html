<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Tabla de Sensores</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">Panel de Sensores Flask + SQLite</span>
    </div>
</nav>

<div class="container">

    <div class="card shadow-sm mb-4">
        <div class="card-header bg-primary text-white">
            Nuevo registro
        </div>
        <div class="card-body">
            <form id="formNuevo" class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Lugar</label>
                    <input type="text" class="form-control" id="lugar">
                </div>

                <div class="col-md-2">
                    <label class="form-label">CO2</label>
                    <input type="number" class="form-control" id="co2">
                </div>

                <div class="col-md-2">
                    <label class="form-label">Temp</label>
                    <input type="number" step="0.01" class="form-control" id="temp">
                </div>

                <div class="col-md-2">
                    <label class="form-label">Hum</label>
                    <input type="number" step="0.01" class="form-control" id="hum">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Fecha</label>
                    <input type="text" class="form-control" id="fecha" placeholder="22/3/2021">
                </div>

                <div class="col-12">
                    <button type="submit" class="btn btn-success">
                        Guardar registro
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
            Lecturas almacenadas
        </div>

        <div class="card-body">

            <div class="mb-3">
                <input type="text" id="buscar" class="form-control" placeholder="Buscar por lugar...">
            </div>

            <table class="table table-striped table-bordered align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Lugar</th>
                        <th>CO2</th>
                        <th>Temp</th>
                        <th>Hum</th>
                        <th>Fecha</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaDatos"></tbody>
            </table>

        </div>
    </div>

</div>

<script>
async function cargarDatos() {
    const search = document.getElementById("buscar").value;
    const response = await fetch(`/api/datos?search=${search}`);
    const result = await response.json();

    const tabla = document.getElementById("tablaDatos");
    tabla.innerHTML = "";

    result.data.forEach(sensor => {
        tabla.innerHTML += `
            <tr>
                <td>${sensor.id}</td>
                <td>
                    <input class="form-control" id="lugar-${sensor.id}" value="${sensor.lugar || ''}">
                </td>
                <td>${sensor.co2 ?? ''}</td>
                <td>${sensor.temp ?? ''}</td>
                <td>${sensor.hum ?? ''}</td>
                <td>${sensor.fecha ?? ''}</td>
                <td>
                    <button class="btn btn-sm btn-primary" onclick="actualizar(${sensor.id})">
                        Actualizar
                    </button>
                    <button class="btn btn-sm btn-danger" onclick="eliminar(${sensor.id})">
                        Eliminar
                    </button>
                </td>
            </tr>
        `;
    });
}

async function actualizar(id) {
    const lugar = document.getElementById(`lugar-${id}`).value;

    await fetch(`/api/data/${id}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ lugar: lugar })
    });

    cargarDatos();
}

async function eliminar(id) {
    await fetch(`/api/data/${id}`, {
        method: "DELETE"
    });

    cargarDatos();
}

document.getElementById("formNuevo").addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = {
        lugar: document.getElementById("lugar").value,
        co2: document.getElementById("co2").value,
        temp: document.getElementById("temp").value,
        hum: document.getElementById("hum").value,
        fecha: document.getElementById("fecha").value
    };

    await fetch("/api/data", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    this.reset();
    cargarDatos();
});

document.getElementById("buscar").addEventListener("input", cargarDatos);

cargarDatos();
</script>

</body>
</html>
